<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Apex Gadgets Customer Support System</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%234fd8c4'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0e13;
            --surface: #131920;
            --surface-hover: #171f27;
            --border: #232c36;
            --text-primary: #edf1f4;
            --text-secondary: #8592a0;
            --text-tertiary: #55616d;
            --accent: #4fd8c4;
            --status-handled: #34d399;
            --status-review: #f5a623;
            --status-irrelevant: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at 15% 0%, rgba(79, 216, 196, 0.07), transparent 40%);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 3rem clamp(1.5rem, 5vw, 4rem);
            min-height: 100vh;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(79, 216, 196, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(79, 216, 196, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 216, 196, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .status-dot { animation: none; }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(1.75rem, 3.5vw, 2.75rem);
            line-height: 1.15;
            letter-spacing: -0.01em;
            margin: 0;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0.75rem 0 2.5rem;
            max-width: 42ch;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--card-accent, var(--accent));
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .card:hover {
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .card .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .card .value {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
            font-size: 2.25rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.75rem;
            max-width: 720px;
        }

        .panel h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 1.5rem;
        }

        footer {
            margin-top: 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="eyebrow">
        <span class="status-dot"></span>
        <span id="statusText">LIVE — MONITORING INBOX</span>
    </div>

    <h1>APEX GADGETS<br>CUSTOMER SUPPORT SYSTEMS</h1>
    <p class="subtitle">Autonomous email triage and response, updated in real time.</p>

    <div class="cards" id="cards"></div>

    <div class="panel">
        <h2>Today's Breakdown</h2>
        <canvas id="breakdownChart" height="220"></canvas>
    </div>

    <footer id="footer">Apex Gadgets · Internal Operations</footer>

    <script src="/static/dashboard.js"></script>
</body>
</html>
